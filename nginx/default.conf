server {
    listen 80;
    server_name adkulan.shop www.adkulan.shop;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name adkulan.shop www.adkulan.shop;

    ssl_certificate /etc/letsencrypt/live/adkulan.shop/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/adkulan.shop/privkey.pem;

    # Optimization
    client_max_body_size 10M;

    # Reverse proxy to the Next.js app
    location / {
        proxy_pass http://web:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
